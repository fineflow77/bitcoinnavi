<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle matching header bg color -->
  <circle cx="16" cy="16" r="15" fill="#1a202c" />
  
  <!-- Subtle border matching the header border color -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#2c333e" stroke-width="1" />
  
  <!-- Bitcoin symbol with gradient matching the header title gradient -->
  <g>
    <path 
      d="M20.5 11.5c-.2-1.4-1.6-1.9-3-2V7h-2v2.5h-1V7h-2v2.5H9v2h1.4c.6 0 .8.2.8.6v7.8c0 .4-.3.6-.7.6H9v2h3.5V25h2v-2.5h1V25h2v-2.5c3.2-.2 5-1.1 5-3.6 0-1.8-1-2.8-2.7-3.2 1.1-.5 1.9-1.3 1.7-2.7zm-6.7-1h2.8c1.1 0 2 .4 2 1.5 0 1.1-.9 1.5-2 1.5h-2.8v-3zm3.2 8h-3.2v-3h3.2c1.1 0 2.2.4 2.2 1.5 0 1.1-.9 1.5-2.2 1.5z" 
      fill="url(#gradient)" 
      stroke="#amber-400" 
      stroke-width="0.5" 
      stroke-opacity="0.7"
    />
    
    <!-- Gradient matching the header title gradient exactly -->
    <defs>
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4795EA" /> <!-- Blue from header -->
        <stop offset="100%" stop-color="#42D392" /> <!-- Green from header -->
      </linearGradient>
    </defs>
  </g>
  
  <!-- Subtle amber accent matching the active navigation color -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#F59E0B" stroke-width="0.5" stroke-opacity="0.3" />
</svg>
